name: build
on:
  #push:
  #  branches: [ "master" ]
  #pull_request:
  #  branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        run: |
          sudo apt update -y -qqq
          sudo apt autoremove --purge -y needrestart || : 
          sudo apt install -y bash wget
          sudo ln -svf bash /bin/sh
          sudo apt autoremove --purge -y --allow-remove-essential php* lxd* snap* firefox*
          sudo apt install -y -qqq gcc g++ cmake m4 pkg-config libc6-dev git curl openssl libssl-dev clang llvm python3-dev vim libsqlite3-dev libcap-dev
          sudo apt install -y -qqq ca-certificates binutils coreutils util-linux findutils diffutils patch sed gawk grep file gzip bzip2 xz-utils tar
          sudo wget https://raw.githubusercontent.com/icebluey/build-nginx/refs/heads/master/ub2204/.preinstall_ub2204 -O /tmp/install-xxxx.tmp.sh
          sudo bash /tmp/install-xxxx.tmp.sh
          sudo rm -fr /tmp/*
          sudo systemctl start docker
          sudo df -Th

      - name: build
        run: sudo /bin/bash run-build-al9.sh

      - name: Generate release tag env
        run: |
          _release_ver="$(/tmp/codex --version 2>&1 | head -n 1 | awk '{print $NF}')"
          echo "_release_ver=${_release_ver}" >> $GITHUB_ENV

      - name: Upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env._release_ver }}
          files: /tmp/codex
          overwrite_files: true

